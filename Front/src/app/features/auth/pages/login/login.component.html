<div class="login-container animate-fade">
  <div class="glass-panel login-card animate-slide">
    <!-- Logo / Título Institucional -->
    <div class="brand-section">
      <div class="brand-logo">
        <span class="logo-icon">🎓</span>
      </div>
      <h1 class="brand-title">IST Yavirac</h1>
      <p class="brand-subtitle">Sistema de Gestión de Inventario</p>
    </div>

    <!-- Formulario -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label class="form-label" for="identifier">Cédula o Correo Institucional</label>
        <input
          id="identifier"
          type="text"
          class="form-input"
          placeholder="Escribe &quot;admin&quot; o tu cédula"
          formControlName="identifier"
          [class.input-error]="isFieldInvalid('identifier')"
        />
        <span class="error-text" *ngIf="isFieldInvalid('identifier')">
          Por favor ingresa un identificador válido
        </span>
      </div>

      <div class="form-group">
        <div class="label-wrapper">
          <label class="form-label" for="password">Contraseña</label>
        </div>
        <input
          id="password"
          type="password"
          class="form-input"
          placeholder="Escribe &quot;temporal&quot; para primer login"
          formControlName="password"
          [class.input-error]="isFieldInvalid('password')"
        />
        <span class="error-text" *ngIf="isFieldInvalid('password')">
          La contraseña debe tener al menos 6 caracteres
        </span>
      </div>

      <!-- Mensaje de error general del backend -->
      <div class="alert-box error-alert" *ngIf="errorMessage()">
        <span class="alert-icon">⚠️</span>
        <span class="alert-message">{{ errorMessage() }}</span>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading() || loginForm.invalid">
        <span class="spinner" *ngIf="isLoading()"></span>
        <span *ngIf="!isLoading()">Iniciar sesión</span>
      </button>

      <div class="text-center">
        <a routerLink="/auth/forgot-password" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </div>
    </form>



    <div class="login-footer">
      <p>Sistema de Inventario © {{ currentYear }}</p>
    </div>
  </div>
</div>
